services:
  audioflow:
    image: ghcr.io/2222221029/audioflow:latest
    container_name: audioflow
    restart: unless-stopped
    environment:
      AUDIOFLOW_DEFAULT_USERNAME: ${AUDIOFLOW_DEFAULT_USERNAME:-admin}
      AUDIOFLOW_DEFAULT_PASSWORD: ${AUDIOFLOW_DEFAULT_PASSWORD:-admin}
      AUDIOFLOW_COOKIE_SECRET: ${AUDIOFLOW_COOKIE_SECRET:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      AUDIOFLOW_ALLOW_RAW_AUDIO_PROXY: ${AUDIOFLOW_ALLOW_RAW_AUDIO_PROXY:-false}
    volumes:
      - ${AUDIOFLOW_DATA_DIR:-/vol1/1000/docker/audioflow/data}:/app/data
      - ${AUDIOFLOW_CONFIG_DIR:-/vol1/1000/docker/audioflow/config}:/app/config
      - ${AUDIOFLOW_LOG_DIR:-/vol1/1000/docker/audioflow/logs}:/app/logs
      - ${AUDIOFLOW_DOWNLOAD_DIR:-/vol1/1000/downloads/有声书}:/app/downloads
    ports:
      - "${WEB_PORT:-8082}:8082"
