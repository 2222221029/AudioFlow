<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arc" x1="12" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".52" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="wave" x1="18" y1="41" x2="48" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cb6ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- 背景：深色圆角矩形，与 app-logo-bg CSS 样式一致 -->
  <rect x="5" y="5" width="54" height="54" rx="16"
        fill="#131d4a" stroke="#4dd7f5" stroke-opacity=".38" stroke-width="1.4"/>
  <!-- 弧形（耳机弧线） -->
  <path d="M17 33c0-11 6.8-18.8 15-18.8S47 22 47 33"
        stroke="url(#arc)" stroke-width="5.8" stroke-linecap="round" fill="none"/>
  <!-- 左耳垫 -->
  <path d="M17 32h6c2.8 0 5 2.2 5 5v8h-5c-6.1 0-11-4.9-11-11v-1.5c0-.3.2-.5.5-.5H17Z"
        fill="url(#arc)" opacity=".95"/>
  <!-- 右耳垫 -->
  <path d="M47 32h-6c-2.8 0-5 2.2-5 5v8h5c6.1 0 11-4.9 11-11v-1.5c0-.3-.2-.5-.5-.5H47Z"
        fill="url(#arc)" opacity=".95"/>
  <!-- 音波 -->
  <path d="M23 41c2.5-2.6 5.1-2.6 7.8 0s5.4 2.6 8.2 0"
        stroke="url(#wave)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- 底部岛（支架） -->
  <path d="M25 51h14"
        stroke="#eef1ff" stroke-opacity=".62" stroke-width="3" stroke-linecap="round"/>
</svg>
